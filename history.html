<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — IT Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css?v=11">
</head>

<body style="display: none;">

<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand" onclick="window.location.href='dashboard.html'">
            <div class="sidebar-mark" id="brandIcon"></div>
            <div class="sidebar-brand-text">
                <strong>IT Inventory</strong>
                <span id="subtitle">Storage Management System</span>
            </div>
            <button class="sidebar-collapse-btn" id="collapseBtn" onclick="event.stopPropagation(); toggleSidebar()" title="Collapse sidebar">
                <span id="collapseIcon"></span>
            </button>
        </div>

        <div class="sidebar-switcher">
            <select id="locationSwitcher" onchange="switchLocation(this.value)" style="display:none"></select>
            <div id="locationStatic" class="sidebar-location-static" style="display:none"></div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" id="navDashboard"><span id="navDashboardIcon"></span><span class="nav-label">Dashboard</span></a>
            <a href="history.html" class="active" id="navHistory"><span id="navHistoryIcon"></span><span class="nav-label">History</span></a>
            <a href="locations.html" id="locationsNavBtn" style="display:none"><span id="navLocationsIcon"></span><span class="nav-label">Locations</span></a>
        </nav>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon"></span>
                <span class="nav-label" id="themeLabel">Dark mode</span>
            </button>
            <button class="sidebar-logout" onclick="logout()">
                <span id="logoutIcon"></span>
                <span class="nav-label">Logout</span>
            </button>
        </div>
    </aside>

    <div class="main-content">
    <div class="container">

    <div class="header">
        <div>
            <h1>History</h1>
            <p>Every add, removal, edit and order — who, when and why</p>
        </div>
    </div>

    <div class="actions">
        <input id="historySearch" placeholder="Search asset, person or reason..." oninput="renderHistory()">
        <select id="filter" onchange="loadHistory()">
            <option value="ALL">All actions</option>
            <option value="ADD">Added</option>
            <option value="REMOVE">Removed</option>
            <option value="EDIT">Edited</option>
            <option value="DELETE">Deleted</option>
            <option value="ORDER">Ordered</option>
            <option value="DELIVER">Delivered</option>
            <option value="CANCEL">Order Cancelled</option>
        </select>
        <select id="locationFilter" onchange="loadHistory()" style="display:none">
            <option value="">All Locations</option>
        </select>
        <div class="date-range">
            <input id="dateFromFilter" type="date" onchange="loadHistory()" title="From date">
            <span class="date-range-sep">to</span>
            <input id="dateToFilter" type="date" onchange="loadHistory()" title="To date">
        </div>
        <span class="spacer"></span>
        <button class="secondary" onclick="clearFilters()">Clear</button>
        <button onclick="exportHistoryCsv()"><span id="exportIcon"></span>Export CSV</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Date</th>
                    <th>Asset</th>
                    <th>Location</th>
                    <th>Action</th>
                    <th>Quantity</th>
                    <th>Done By</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    </div>
    </div>
</div>

<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=11"></script>
<script src="js/auth.js?v=11"></script>
<script>
    document.getElementById("brandIcon").innerHTML = ICONS.box;
    document.getElementById("logoutIcon").innerHTML = ICONS.logout;
    document.getElementById("navDashboardIcon").innerHTML = ICONS.grid;
    document.getElementById("navHistoryIcon").innerHTML = ICONS.clock;
    document.getElementById("navLocationsIcon").innerHTML = ICONS.building;
    document.getElementById("exportIcon").innerHTML = ICONS.download;
</script>
<script src="js/history.js?v=11"></script>

</body>
</html>
