<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — IT Inventory</title>
<link rel="stylesheet" href="css/style.css?v=6">
</head>

<body style="display: none;">

<div class="container">

    <div class="header">
        <div>
            <h1>Inventory History</h1>
            <p>Every add, removal, edit and order — who, when and why</p>
        </div>
        <div>
            <a href="locations.html"><button class="secondary" id="locationsNavBtn" style="display:none">Locations</button></a>
            <a href="dashboard.html"><button>Dashboard</button></a>
        </div>
    </div>

    <div class="actions">
        <input id="historySearch" placeholder="Search asset, person or reason..." oninput="renderHistory()">
        <select id="filter" onchange="loadHistory()">
            <option value="ALL">All actions</option>
            <option value="ADD">Added</option>
            <option value="REMOVE">Removed</option>
            <option value="EDIT">Edited</option>
            <option value="DELETE">Deleted</option>
            <option value="ORDER">Ordered</option>
            <option value="DELIVER">Delivered</option>
            <option value="CANCEL">Order Cancelled</option>
        </select>
        <select id="locationFilter" onchange="loadHistory()" style="display:none">
            <option value="">All Locations</option>
        </select>
        <input id="dateFilter" type="date" onchange="loadHistory()">
        <span class="spacer"></span>
        <button class="secondary" onclick="clearFilters()">Clear</button>
        <button onclick="exportHistoryCsv()">Export CSV</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Date</th>
                    <th>Asset</th>
                    <th>Location</th>
                    <th>Action</th>
                    <th>Quantity</th>
                    <th>Done By</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

</div>

<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/history.js?v=6"></script>

</body>
</html>
