<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locations — IT Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css?v=12">
</head>

<body style="display: none;">

<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand" onclick="window.location.href='dashboard.html'">
            <div class="sidebar-mark" id="brandIcon"></div>
            <div class="sidebar-brand-text">
                <strong>IT Inventory</strong>
                <span id="subtitle">Storage Management</span>
            </div>
            <button class="sidebar-collapse-btn" id="collapseBtn" onclick="event.stopPropagation(); toggleSidebar()" title="Collapse sidebar">
                <span id="collapseIcon"></span>
            </button>
        </div>

        <div class="sidebar-switcher">
            <select id="locationSwitcher" onchange="switchLocation(this.value)" style="display:none"></select>
            <div id="locationStatic" class="sidebar-location-static" style="display:none"></div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" id="navDashboard"><span id="navDashboardIcon"></span><span class="nav-label">Dashboard</span></a>
            <a href="history.html" id="navHistory"><span id="navHistoryIcon"></span><span class="nav-label">History</span></a>
            <a href="locations.html" class="active" id="locationsNavBtn"><span id="navLocationsIcon"></span><span class="nav-label">Locations</span></a>
        </nav>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon"></span>
                <span class="nav-label" id="themeLabel">Dark mode</span>
            </button>
            <div class="sidebar-user">
                <span id="userIcon"></span>
                <span class="nav-label" id="sidebarUserLabel"></span>
            </div>
            <button class="sidebar-logout" onclick="logout()">
                <span id="logoutIcon"></span>
                <span class="nav-label">Logout</span>
            </button>
        </div>
    </aside>

    <div class="main-content">
    <div class="container">

    <div class="header">
        <div>
            <h1>Locations</h1>
            <p>Manage offices and who has access to each</p>
        </div>
    </div>

    <div class="actions">
        <span class="spacer"></span>
        <button onclick="openAddLocationModal()"><span id="addIcon"></span>Add Location</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Office</th>
                    <th>Users</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="locationsTable"></tbody>
        </table>
    </div>

    <div class="header" style="margin-top:32px;">
        <div>
            <h1 style="font-size:18px;">Users</h1>
            <p>Assign each person to the office(s) they should see</p>
        </div>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Offices</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>

    </div>
    </div>
</div>

<!-- Add / rename location modal -->
<div id="locationModal" class="modal">
    <div class="modal-content">
        <h2 id="locationModalTitle">Add Location</h2>
        <form id="locationForm">
            <label for="locationName">Office name</label>
            <input id="locationName" placeholder="e.g. Charlotte Office" required>
            <div class="modal-buttons">
                <button type="submit">Save</button>
                <button type="button" class="cancel" onclick="closeAddLocationModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Assign offices to a user modal -->
<div id="assignModal" class="modal">
    <div class="modal-content">
        <h2>Assign Offices</h2>
        <p id="assignModalInfo"></p>
        <div id="assignCheckboxes"></div>
        <div class="modal-buttons">
            <button type="button" id="saveAssignmentsBtn">Save</button>
            <button type="button" class="cancel" onclick="closeAssignModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=12"></script>
<script src="js/auth.js?v=12"></script>
<script>
    document.getElementById("brandIcon").innerHTML = ICONS.box;
    document.getElementById("logoutIcon").innerHTML = ICONS.logout;
    document.getElementById("navDashboardIcon").innerHTML = ICONS.grid;
    document.getElementById("navHistoryIcon").innerHTML = ICONS.clock;
    document.getElementById("navLocationsIcon").innerHTML = ICONS.building;
    document.getElementById("userIcon").innerHTML = ICONS.user;
    document.getElementById("addIcon").innerHTML = ICONS.plus;
</script>
<script src="js/locations.js?v=12"></script>

</body>
</html>
