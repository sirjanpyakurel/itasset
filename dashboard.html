<!DOCTYPE html>
<html>

<head>

<title>IT Inventory</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body style="display: none;">


<div class="container">




<div class="header">

<div>
<h1 style="cursor: pointer;" onclick="window.location.reload()">IT Inventory</h1>
<p>Storage Management System</p>
</div>


<div>

<button class="low-btn" onclick="showLowInventory()">
Low Inventory
</button>


<a href="history.html">
<button class="history-btn">
History
</button>
</a>


<button class="logout" onclick="logout()">
Logout
</button>


</div>


</div>




<div class="cards">


<div class="card">

<h3>Total Assets</h3>

<h2 id="totalAssets">
0
</h2>

</div>



<div class="card">

<h3>Total Quantity</h3>

<h2 id="totalQuantity">
0
</h2>

</div>


</div>




<div class="actions">


<input 
id="searchBox"
placeholder="Search inventory..."
onkeyup="searchAssets()"
>


<button onclick="openAddModal()">
+ Add Asset
</button>


</div>




<div class="table-box">


<table>


<thead>

<tr>

<th>Name</th>
<th>Category</th>
<th>Quantity</th>
<th>Action</th>

</tr>


</thead>


<tbody id="assetTable">

</tbody>


</table>


</div>


</div>

<div id="addModal" class="modal">


<div class="modal-content">


<h2>Add Asset</h2>


<form id="addAssetForm">

<input 
id="assetName"
placeholder="Asset Name"
required
>


<select id="assetCategory" required>

<option value="">
Select Category
</option>

<option value="Monitor">
Monitor
</option>

<option value="Laptop">
Laptop
</option>

<option value="Keyboard">
Keyboard
</option>

<option value="Mouse">
Mouse
</option>

<option value="Cable">
Cable
</option>

<option value="Adapter">
Adapter
</option>

<option value="Docking Station">
Docking Station
</option>

<option value="Headset">
Headset
</option>

<option value="iPhone Case">
iPhone Case
</option>

<option value="iPad Case">
iPad Case
</option>

<option value="Other">
Other
</option>

</select>


<input 
id="assetQuantity"
type="text"
placeholder="Quantity"
min="1"
required
onkeypress="return event.charCode >= 48 && event.charCode <= 57"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
>


<input 
id="assetDescription"
placeholder="Description"
>



<button type="submit">
Save
</button>


<button type="button" class="cancel" onclick="closeAddModal()">
Cancel
</button>

</form>


</div>

</div>

<div id="removeModal" class="modal">
    <div class="modal-content">
        <h2>Remove Quantity</h2>
        <p>How many do you want to remove?</p>
        <input 
            id="removeQuantityInput" 
            type="number" 
            min="1" 
            placeholder="Enter quantity"
            onkeypress="return event.charCode >= 48 && event.charCode <= 57"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        >
        <p id="removeReasonLabel">Reason for removal:</p>
        <input 
            id="removeReasonInput" 
            type="text" 
            placeholder="Enter reason"
        >
        <div class="modal-buttons">
            <button id="confirmRemoveButton">Remove</button>
            <button id="cancelRemoveButton" class="cancel">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>requireAuth();</script>
<script src="js/dashboard.js"></script>


</body>

</html>
