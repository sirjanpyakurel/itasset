<!DOCTYPE html>
<html>
<head>
    <title>IT Inventory Login</title>
    <link rel="stylesheet" href="css/style.css?v=7">
</head>

<body class="login-page">

<div class="login-box">

    <h2>IT Inventory</h2>

    <form id="loginForm">

    <input 
        id="email"
        type="email"
        placeholder="Email"
        required
    >

    <input 
        id="password"
        type="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Login
    </button>

    </form>

    <p id="message"></p>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js?v=7"></script>

<script src="js/auth.js?v=7"></script>
<script>
    if (new URLSearchParams(window.location.search).get("timeout") === "1") {
        document.getElementById("message").textContent = "You were signed out due to inactivity.";
    }
    checkUser();
</script>

</body>
</html>
