<!DOCTYPE html>
<html>
<head>
    <title>IT Inventory Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

<div class="login-box">

    <h2>IT Inventory</h2>
    <h3>Sign Up</h3>

    <form id="signupForm">

    <input 
        id="email"
        type="email"
        placeholder="Email"
        required
    >

    <input 
        id="password"
        type="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Sign Up
    </button>

    </form>

    <p id="message"></p>
    <p>Already have an account? <a href="index.html">Login</a></p>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/auth.js"></script>
<script>setupSignupForm();</script>

</body>
</html>
